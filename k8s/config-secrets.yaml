---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gbrain-config
  namespace: gbrain
  labels:
    app: gbrain
data:
  app-config.json: |
    {
      "environment": "production",
      "log_level": "INFO",
      "features": {
        "cache_enabled": true,
        "llm_integration": true,
        "distributed_agents": true
      },
      "performance": {
        "cache_size_mb": 512,
        "db_pool_size": 20,
        "request_timeout_seconds": 30
      },
      "monitoring": {
        "metrics_enabled": true,
        "tracing_enabled": true,
        "logging_enabled": true
      }
    }
  nginx-config.conf: |
    upstream api {
      server gbrain-api:8000;
    }

    server {
      listen 80;
      server_name _;

      location / {
        proxy_pass http://api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
      }

      location /health {
        access_log off;
        proxy_pass http://api;
      }
    }
---
apiVersion: v1
kind: Secret
metadata:
  name: gbrain-secrets
  namespace: gbrain
  labels:
    app: gbrain
type: Opaque
stringData:
  database-url: "postgresql://user:password@postgres:5432/gbrain"
  neo4j-url: "neo4j://neo4j:password@neo4j:7687"
  claude-api-key: "sk-ant-XXXXXXXXXXXXX"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: gbrain-api
  namespace: gbrain
  labels:
    app: gbrain
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: gbrain-api
  namespace: gbrain
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: gbrain-api
  namespace: gbrain
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: gbrain-api
subjects:
- kind: ServiceAccount
  name: gbrain-api
  namespace: gbrain
